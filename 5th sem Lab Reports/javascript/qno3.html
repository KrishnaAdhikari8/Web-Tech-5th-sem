<!-- Provide examples of javascript conditional statements. -->

<!DOCTYPE html>
<html>
<head>
    <title>JavaScript Conditional Statements</title>
</head>
<body>
    <h2>JavaScript Conditional Statements Example</h2>
    <script>
        // if statement
        let age = 20;
        if (age >= 18) {
            document.write("<h3>IF Statement</h3>");
            document.write("You are eligible to vote.<br><br>");
        }
        let marks = 35;
        document.write("<h3>IF...ELSE Statement</h3>");
        if (marks >= 40) {
            document.write("Pass<br><br>");
        } else {
            document.write("Fail<br><br>");
        }
        let score = 75;
        document.write("<h3>IF...ELSE IF...ELSE Statement</h3>");
        if (score >= 80) {
            document.write("Grade A<br><br>");
        } else if (score >= 60) {
            document.write("Grade B<br><br>");
        } else {
            document.write("Grade C<br><br>");
        }
        // switch statement
        let day = 2;

        document.write("<h3>SWITCH Statement</h3>");
        switch (day) {
            case 1:
                document.write("Sunday");
                break;
            case 2:
                document.write("Monday");
                break;
            case 3:
                document.write("Tuesday");
                break;
            default:
                document.write("Invalid Day");
        }
    </script
</body>
</html>
