<!-- What is javascript? How can we generate output in it? -->
<!-- 
JavaScript (JS) is a high-level, interpreted scripting language used to make web pages interactive and dynamic. 
It is mainly used for client-side web development and works together with HTML and CSS.
Features of JavaScript
Adds interactivity to web pages.
Validates form data.
Manipulates HTML and CSS dynamically.
Handles events such as clicks and keyboard input.
Creates animations and dynamic content.


How Can We Generate Output in JavaScript?

JavaScript provides several ways to display output:
1. Using document.write()
<script>
document.write("Hello World!");
</script>
Output: Hello World!

2. Using alert()
<script>
alert("Hello World!");
</script>
Output: Displays a popup message box.

3. Using console.log()
<script>
console.log("Hello World!");
</script>
Output: Displays text in the browser's console.

4. Using innerHTML
<p id="demo"></p>
<script>
document.getElementById("demo").innerHTML = "Hello World!";
</script>

Output: Hello World! appears inside the paragraph. -->
