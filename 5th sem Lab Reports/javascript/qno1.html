<!-- What is javascript? How can we generate output in it? -->
<!-- 
JavaScript (JS) is a high-level, interpreted scripting language used to make web pages interactive and dynamic. 
It is mainly used for client-side web development and works together with HTML and CSS.
Features of JavaScript
Adds interactivity to web pages.
Validates form data.
Manipulates HTML and CSS dynamically.
Handles events such as clicks and keyboard input.
Creates animations and dynamic content.
-->

<!DOCTYPE html>
<html>
<head>
    <title>JavaScript Output Methods</title>
</head>
<body>

    <h2>JavaScript Output Methods</h2>

    <p id="demo"></p>

    <script>
        // 1. document.write()
        document.write("<h3>1. document.write()</h3>");
        document.write("Hello World!<br><br>");

        // 2. alert()
        alert("Hello World! from alert()");

        // 3. console.log()
        console.log("Hello World! from console.log()");

        // 4. innerHTML
        document.getElementById("demo").innerHTML =
            "<h3>4. innerHTML</h3>Hello World! from innerHTML";
    </script>

</body>
</html>
