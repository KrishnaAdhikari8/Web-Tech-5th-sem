<!-- Illustrate loops and nested loops with suitable examples.
-A loop is used to execute a block of code repeatedly until a specified condition is met.
-A nested loop is a loop inside another loop. -->

<!DOCTYPE html>
<html>
<head>
    <title>Loops and Nested Loops</title>
</head>
<body>
<h2>Loops and Nested Loops Example</h2>
<script>
    // For Loop
    document.write("<h3>For Loop</h3>");
    for(let i = 1; i <= 5; i++) {
        document.write("Number: " + i + "<br>");
    }
    document.write("<br>");
    // While Loop
    document.write("<h3>While Loop</h3>");
    let j = 1;
    while(j <= 5) {
        document.write("Number: " + j + "<br>");
        j++;
    }
    document.write("<br>");
    // Nested Loop
    document.write("<h3>Nested Loop</h3>");
    for(let row = 1; row <= 3; row++) {
        for(let col = 1; col <= 3; col++) {
            document.write("(" + row + "," + col + ") ");
        }
        document.write("<br>");
    }
</script>
</body>
</html>
