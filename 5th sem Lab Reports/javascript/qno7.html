<!-- Use date object to access date and time to create a simple digital clock 
The Date object in JavaScript is used to get the current date and time. A digital clock can be created by 
updating the time every second using setInterval().

Example Program  -->
<!DOCTYPE html>
<html>
<head>
    <title>Digital Clock</title>
    <style>
        #clock {
            font-size: 40px;
            font-weight: bold;
            text-align: center;
            margin-top: 100px;
        }
    </style>
</head>
<body>
    <h2 align="center">Digital Clock</h2>
    <div id="clock"></div>
    <script>
        function showTime() {
            let now = new Date();
            let hours = now.getHours();
            let minutes = now.getMinutes();
            let seconds = now.getSeconds();
            // Add leading zero if needed
            hours = hours < 10 ? "0" + hours : hours;
            minutes = minutes < 10 ? "0" + minutes : minutes;
            seconds = seconds < 10 ? "0" + seconds : seconds;
            document.getElementById("clock").innerHTML =
                hours + ":" + minutes + ":" + seconds;
        }
        // Update clock every second
        setInterval(showTime, 1000)
        // Display immediately
        showTime();
    </script>
</body>
</html>
