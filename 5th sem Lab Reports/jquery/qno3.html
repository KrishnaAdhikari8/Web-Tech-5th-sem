<!-- Q.Use jQuery to create plugins like: slider, lightbox, accordion, zoom and toast messages.
Here's a single HTML file that demonstrates all five jQuery plugins (Slider, Lightbox, Accordion, Zoom, and Toast Message) together. -->

<!DOCTYPE html>
<html>
<head>
<title>jQuery Plugins Demo</title>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<style>
#slider img{width:200px;height:120px;display:none}
.acc div,.toast{display:none}
.toast{position:fixed;bottom:10px;right:10px;background:black;color:white;padding:10px}
</style>
</head>
<body>
<h3>Slider</h3>
<div id="slider">
<img src="https://picsum.photos/200/120?1">
<img src="https://picsum.photos/200/120?2">
</div>
<h3>Lightbox</h3>
<img id="light" src="https://picsum.photos/100">
<h3>Accordion</h3>
<div class="acc">
<h4>Click Me</h4>
<div>Accordion Content</div>
</div>
<h3>Zoom</h3>
<img id="zoom" src="https://picsum.photos/120">
<h3>Toast</h3>
<button id="btn">Show Toast</button>
<div class="toast">Saved Successfully!</div>
<script>
$(function(){
// Slider
let i=0,s=$("#slider img");
s.eq(0).show();
setInterval(()=>{s.hide();s.eq(++i%s.length).show();},2000);
// Lightbox
$("#light").click(function(){window.open($(this).attr("src"));});
// Accordion
$(".acc h4").click(()=>$(".acc div").slideToggle());
// Zoom
$("#zoom").hover(
function(){$(this).css("transform","scale(1.5)")},
function(){$(this).css("transform","scale(1)")});
// Toast
$("#btn").click(function(){
$(".toast").fadeIn().delay(2000).fadeOut();
});
});
</script>
</body>
</html>
