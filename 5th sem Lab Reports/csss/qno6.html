<!DOCTYPE html>
<html>
<head>
    <title>Dropdown Navigation Bar</title>
    <style>
        body{
            margin:0;
            font-family:Arial, sans-serif;
        }

        ul{
            list-style:none;
            margin:0;
            padding:0;
            background:#333;
            overflow:hidden;
        }

        li{
            float:left;
            position:relative;
        }

        li a{
            display:block;
            color:white;
            text-decoration:none;
            padding:14px 20px;
        }

        li a:hover{
            background:#04AA6D;
        }

        .dropdown-content{
            display:none;
            position:absolute;
            background:#f1f1f1;
            min-width:160px;
            z-index:1;
        }

        .dropdown-content a{
            color:black;
            display:block;
            padding:12px 16px;
            text-decoration:none;
        }

        .dropdown-content a:hover{
            background:#ddd;
        }

        .dropdown:hover .dropdown-content{
            display:block;
        }
    </style>
</head>
<body>

<ul>
    <li><a href="#">Home</a></li>

    <li class="dropdown">
        <a href="#">Services</a>
        <div class="dropdown-content">
            <a href="#">Web Design</a>
            <a href="#">App Development</a>
            <a href="#">SEO</a>
        </div>
    </li>

    <li><a href="#">About</a></li>
    <li><a href="#">Contact</a></li>
</ul>

</body>
</html>
