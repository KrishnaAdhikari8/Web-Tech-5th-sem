<!DOCTYPE html>
<html>
<head>
    <title>CSS Floating Template</title>
    <style>
        .container {
            width: 800px;
            margin: auto;
            border: 1px solid black;
        }

        .row {
            width: 100%;
            overflow: hidden;
        }

        .box {
            border: 1px solid black;
            box-sizing: border-box;
            height: 100px;
            float: left;
        }

        .full { width: 100%; }

        .half { width: 50%; }

        .third { width: 33.33%; }

        .quarter { width: 25%; }

        .fifth { width: 20%; }
    </style>
</head>
<body>

<div class="container">

    <!-- Row 1 -->
    <div class="row">
        <div class="box full"></div>
    </div>

    <!-- Row 2 -->
    <div class="row">
        <div class="box half"></div>
        <div class="box half"></div>
    </div>

    <!-- Row 3 -->
    <div class="row">
        <div class="box third"></div>
        <div class="box third"></div>
        <div class="box third"></div>
    </div>

    <!-- Row 4 -->
    <div class="row">
        <div class="box quarter"></div>
        <div class="box quarter"></div>
        <div class="box quarter"></div>
        <div class="box quarter"></div>
    </div>

    <!-- Row 5 -->
    <div class="row">
        <div class="box fifth"></div>
        <div class="box fifth"></div>
        <div class="box fifth"></div>
        <div class="box fifth"></div>
        <div class="box fifth"></div>
    </div>

</div>

</body>
</html>
