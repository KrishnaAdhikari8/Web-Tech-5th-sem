<!-- What are stylesheets? How to use CSS internally and externally? -->

<!-- A stylesheet is a collection of CSS (Cascading Style Sheets) rules used to control the appearance and layout of HTML elements 
such as colors, fonts, spacing, and positioning. -->

<!DOCTYPE html>
<html>
<head>
    <title>Internal CSS</title>
    <style>
        h1 {
            color: blue;
        }
        p {
            font-size: 18px;
        }
    </style>
</head>
<body>

<h1>Welcome</h1>
<p>This is an example of Internal CSS.</p>

</body>
</html>
