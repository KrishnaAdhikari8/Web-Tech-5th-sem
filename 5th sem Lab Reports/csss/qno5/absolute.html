<!DOCTYPE html>
<html>
<head>
<style>
.container {
    width: 300px;
    height: 200px;
    border: 2px solid black;
    position: relative;
}

.box {
    width: 100px;
    height: 100px;
    background-color: orange;
    position: absolute;
    top: 20px;
    left: 50px;
}
</style>
</head>
<body>

<div class="container">
    <div class="box">Absolute Box</div>
</div>

</body>
</html>
