<!-- Create a simple division template containing header, content and footer using HTML and CSS -->
<!DOCTYPE html>
<html>
<head>
    <title>Division Template</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        .header {
            background-color: lightblue;
            text-align: center;
            padding: 20px;
        }

        .content {
            background-color: lightgray;
            padding: 40px;
            min-height: 300px;
        }

        .footer {
            background-color: lightblue;
            text-align: center;
            padding: 15px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Website Header</h1>
    </div>

    <div class="content">
        <h2>Content Section</h2>
        <p>This is the main content area of the webpage.</p>
    </div>

    <div class="footer">
        <p>&copy; 2026 My Website. All Rights Reserved.</p>
    </div>

</body>
</html>
