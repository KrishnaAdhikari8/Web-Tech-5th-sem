<!-- 2.What are lists? Show the application of lists in HTM -->

<!-- 
Lists are used to display related items in a structured manner on a web page.
Application: Lists are used for menus, navigation links, product categories, steps in a process, and displaying grouped information. -->

<!DOCTYPE html>
<html>
<head>
    <title>HTML Lists</title>
</head>
<body>

<h3>Ordered List</h3>
<ol>
    <li>HTML</li>
    <li>CSS</li>
    <li>JavaScript</li>
</ol>

<h3>Unordered List</h3>
<ul>
    <li>Apple</li>
    <li>Mango</li>
    <li>Orange</li>
</ul>

<h3>Description List</h3>
<dl>
    <dt>HTML</dt>
    <dd>HyperText Markup Language</dd>

    <dt>CSS</dt>
    <dd>Cascading Style Sheets</dd>
</dl>

</body>
</html>
