<!-- What is absolute and relative path reference? How can we insert images and links in an HTML 
page? Explain with example. -->

<!--
 1. Absolute Path
An absolute path contains the complete URL or full location of a file.
Example:
<img src="https://www.example.com/images/photo.jpg" alt="Photo">
2. Relative Path
A relative path specifies the file location relative to the current HTML file.
Example:
<img src="images/photo.jpg" alt="Photo">        -->

<!DOCTYPE html>
<html>
<head>
    <title>Images and Links</title>
</head>
<body>
<h2>Image Example</h2>
<img src="flower.jpg" alt="Flower" width="200">
<h2>Link Example</h2>
<a href="https://www.google.com">Visit Google</a>
</body>
</html>
