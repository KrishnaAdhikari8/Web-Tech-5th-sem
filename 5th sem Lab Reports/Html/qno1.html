<!-- Create an HTML table showcasing the use of attributes like margin, rowspan, colspan, 
cellspacing, etc. -->

<!DOCTYPE html>
<html>
<head>
    <title>HTML Table Example</title>
</head>
<body marginwidth="50" marginheight="30">

<h2>Student Information Table</h2>

<table border="1" cellspacing="10" cellpadding="8" width="60%">
    
    <tr>
        <th rowspan="2">Roll No</th>
        <th rowspan="2">Name</th>
        <th colspan="2">Marks</th>
    </tr>

    <tr>
        <th>Math</th>
        <th>Science</th>
    </tr>

    <tr>
        <td>1</td>
        <td>Ram</td>
        <td>85</td>
        <td>90</td>
    </tr>

    <tr>
        <td>2</td>
        <td>Shyam</td>
        <td>80</td>
        <td>88</td>
    </tr>

    <tr>
        <td colspan="2">Total Students</td>
        <td colspan="2">2</td>
    </tr>

</table>

</body>
</html>
