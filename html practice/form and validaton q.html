<!-- Create an HTML signup form with fields Name, Email, Password, and Age, Validate the form using JavaScript. 
Write functions for validating each of the elements. All of the fields should not be empty. The Email address
should be a valid email, the password should be of length at least 6 and should start with the alphabet and end with a digit. 
The age should be between 8 and 60. -->

<!DOCTYPE html>
<html>
<head>
    <title>Signup Form Validation</title>
    <script>
        function validateName() {
            let name = document.getElementById("name").value;
            if (name == "") {
                alert("Name cannot be empty");
                return false;
            }
            return true;
        }

        function validateEmail() {
            let email = document.getElementById("email").value;
            let pattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

            if (email == "") {
                alert("Email cannot be empty");
                return false;
            }

            if (!pattern.test(email)) {
                alert("Enter a valid email address");
                return false;
            }
            return true;
        }

        function validatePassword() {
            let password = document.getElementById("password").value;

            if (password == "") {
                alert("Password cannot be empty");
                return false;
            }

            if (password.length < 6) {
                alert("Password must be at least 6 characters");
                return false;
            }

            if (!/^[A-Za-z].*\d$/.test(password)) {
                alert("Password must start with an alphabet and end with a digit");
                return false;
            }

            return true;
        }

        function validateAge() {
            let age = document.getElementById("age").value;

            if (age == "") {
                alert("Age cannot be empty");
                return false;
            }

            if (age < 8 || age > 60) {
                alert("Age must be between 8 and 60");
                return false;
            }

            return true;
        }

        function validateForm() {
            return validateName() &&
                   validateEmail() &&
                   validatePassword() &&
                   validateAge();
        }
    </script>
</head>
<body>

    <h2>Signup Form</h2>

    <form onsubmit="return validateForm()">
        Name:
        <input type="text" id="name"><br><br>

        Email:
        <input type="text" id="email"><br><br>

        Password:
        <input type="password" id="password"><br><br>

        Age:
        <input type="number" id="age"><br><br>

        <input type="submit" value="Sign Up">
    </form>

</body>
</html>
