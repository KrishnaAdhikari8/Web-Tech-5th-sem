<!-- Design a form containing textbox for username, password field for password, radio button for gender and checkbox for hobbies.
Write a program for client-side validation of the form for the username and password field as required fields, the length of 
username should be 5, the radio button and checkbox should be checked. -->

<!DOCTYPE html>
<html>
<head>
    <title>Form Validation</title>
    <script>
        function validateForm() {
            let username = document.forms["myForm"]["username"].value;
            let password = document.forms["myForm"]["password"].value;

            if (username == "") {
                alert("Username is required");
                return false;
            }

            if (username.length != 5) {
                alert("Username must be exactly 5 characters");
                return false;
            }

            if (password == "") {
                alert("Password is required");
                return false;
            }

            let gender = document.querySelector('input[name="gender"]:checked');
            if (!gender) {
                alert("Please select gender");
                return false;
            }

            let hobbies = document.querySelectorAll('input[name="hobby"]:checked');
            if (hobbies.length == 0) {
                alert("Please select at least one hobby");
                return false;
            }

            alert("Form submitted successfully!");
            return true;
        }
    </script>
</head>
<body>

<h2>Registration Form</h2>

<form name="myForm" onsubmit="return validateForm()">
    Username:
    <input type="text" name="username"><br><br>

    Password:
    <input type="password" name="password"><br><br>

    Gender:
    <input type="radio" name="gender" value="Male"> Male
    <input type="radio" name="gender" value="Female"> Female
    <br><br>

    Hobbies:
    <input type="checkbox" name="hobby" value="Reading"> Reading
    <input type="checkbox" name="hobby" value="Sports"> Sports
    <input type="checkbox" name="hobby" value="Music"> Music
    <br><br>

    <input type="submit" value="Submit">
</form>

</body>
</html>
